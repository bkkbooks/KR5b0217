front:
  text: 黄籙九幽醮無碍夜齋次第儀場四
  hash: sha256:15ffaaa5c1a9ca1e36b1e1df2055fd3541355b814bd52223004633c725bf2f02
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5b0217_SJB_000-090747a, image: sjb/09/090747a.png}
body:
  text: 先於建道場日申時詣玄中大法師前拜啓玄章焚之次至酉時於三天大法師前齋主上香法師請關牒官中三道士庶一道次法師度牒與齋主次齋主傳與道流一人捧之道衆舉華夏迎往大門外設香案仍以香茶酒果供養三分令齋主上香再拜次法師啓白伏以拔幽魂振滯魄莫大於黄籙妙齋締善果植殊因無逾乎紫清祕檢惟克修於珍供必仰奉於瓊科旣華墠之建儀在明神而受軄以謂九方同宇雖並統於潜祇萬域異區寔交分於靈局奠紘維之靈壤垂里域之丕偁載脩沖妙之䂓寔有關聞之式今者謹有齋主奉爲亡過某人或七或周年或忌日命道士若干人恭就奉靈之室聿修度品之齋薜席載嚴籣場式啓騰誠三界仗四直以敷揚拯罪九幽覬五道而開度城隍土地里杜正神共證齋功同資妙果是用先伸關牒吿達明靈伏望眞聦俯垂明鑒表白宣關牒法師再啓白向來齋修之意具述牒文宣白巳周各希聽用共軄瑶壇之事俾超泉府之魂在靈造之克勤則齋功而允就唯神聦直俯受斯言無任䖍祝之至焚錢馬關牒單狀焚詞頌回向念善退次別排辦香花卓子一隻召魂巾一條請齋主上香次法師執召魂巾召請亡靈啓白巾長一丈二尺以熟絹伏以淵宗諸粹包千有以摛慈靈宰播庸同九冥而垂照茂著薦崇之典丕昭濟度之功苟克奉於沖䂓諒寧忘於妙䕃今者奉爲齋主某人伏爲亡過某人奄辭昭世倐傃幽塗弟罤深哀慕之誠春戚盡訴號之懇爰遵祕式克闡靈場駢珍供於家庭備眞儀於舘宇瓊科祗肅仰霄極之垂私玉梵虛徐迓丘寒之降顧庶荷締縁之力即承度品之恩伏冀猋歘丕臨神靈昭格代魄荐除於黑簿楚魂來入於循門離九署之風刀消其積釁從三清之雲欘被此殊縁弭百罪於眞靈儲千祥於後裔永彰欽奉無爽鑒觀謹言次威儀法事引亡靈入宅靈座奉安沿路令道流一人持淨水鉢盂以柳枝酒淨散穢念諸天内音大梵隱語至座訖知磬起啓堂頌法師啓白伏聞天地長久尚聞傾覆之期日月髙明由有虧盈之度況乎人生三界性禀五常豈能免此輪迴離其生死夫有生必有死无始必无終故莊周有夢蝶之悲魯聖興逝川之嘆聖賢不免凡俗難逃今齋主伏爲亡過某人奄辭昭世倏傃幽塗薦資用罄於䖍誠法㑹特陳於此夕今則威儀濟濟法侣詵詵奉爲亡靈皈依三寳舉人各恭信宣三寳及皈依宣告亡靈第一皈依无上道寳十方上聖太上三尊億刧度人先天立敎慈悲廣濟普及羣生玉相金容常當信禮志心皈依十方道寳當願亡靈起心回向一切信禮宣告亡靈第二皈依无上經寳十方世界寳藏靈丈玉字金書龍章鳯篆三十六部萬八千篇指引凡迷超昇道岸行行滅罪句句消災此世他生常當信禮志心皈依十方經寳當願亡靈心開悟解受持轉誦宣告亡靈第三皈依旡上師寳玄中大聖上古三師正一眞人三天教主十方世界得道神仙傳法奉經開度羣品是眞父母是大醫王此世他生常當信禮志心皈依十方師寳當願亡靈普上法橋无有障礙又啓白伏以玉虚垂妙廣昭濟拔之功琅檢著文誕示薦昇之式爰仰遵於祕範庸柢奉於逝靈于今玉梵荐揚瓊綱式舉天章雲篆巳布於良縁歘駕飈輪即彰於殊應期鑒觀於紫宙即超度於朱陵巳聞三寳之名載舉十華之號志心信禮東方九炁天君和神仙諸靈官稽首東方主玉寳皇上尊手執青華節接引此亡靈和往生神仙界志心信禮南方三炁天君和神仙諸靈官稽首南方主玄眞萬福尊手執丹霞節接引此亡靈和往生神仙界志心信禮西方七炁天君和神仙諸靈官稽首西方主太妙至極尊手執素靈節接引此亡靈和往生神仙界志心信禮北方五炁天君和神仙諸靈官稽首北方主玄上玉晨尊手執玄靈節接引此亡靈和往生神仙界志心信禮東北方梵炁天君和神仙諸靈官稽首東北主度仙上聖尊手執緑霞節接引此亡靈和往生神仙界志心信禮東南方梵炁天君和神仙諸靈官稽首東南主好生度命尊手執絳霞節接引此亡靈和往生神仙界志心信禮西南方梵炁天君和神仙諸靈官稽首西南主太靈虛皇尊手執洞靈節接引此亡靈和往生神仙界志心信禮西北方梵炁天君和神仙諸靈官稽首西北主无量太華尊手執紫毛節接引此亡靈和往生神仙界志心信禮上方大羅天君和神仙諸靈官稽首上方主玉虚明皇尊手執命魔節接引此亡靈和往生神仙界志心信禮下方九壘皇君和神仙諸靈官稽首下方主眞皇洞神尊手執召靈節接引此亡靈和往生神仙界次唱禮十方空界一切天尊奉爲亡靈䖍心懴悔次懴悔志心懴悔奉爲亡靈懴悔身業罪身業無邊罪種種益難量舉止去來間滯染諸塵垢華飾貪逸樂傲誕世間人今對大慈尊一心陳懴悔願此身業罪消除永不生清淨契神仙永離三邊界志心懴悔奉爲亡靈懴悔心業罪心業無邊罪種種益難量嗔憙并愛憎一切從心起嗜慾兼妄想嫉妬世間人今對大慈尊一心陳懴悔願此心業罪消除永不生智識迥開通洞達希夷㫖志心懴悔奉爲亡靈懴悔口業罪口業無邊罪種種益難量兩舌及浮言毀謗於經教啖食有情物窘辱世間人今對大慈尊一心陳懴悔願此口業罪消除永不生絶彼是非言常演眞經教志心稽首禮謝无上正眞三寳次吟太道洞玄虚次三塗五苦頌次悲吟啓白向來稱揚十念功徳無限勝因惟願亡靈往生天界花臺花蓋雲際來迎寳節寳幢空中接引騫林樹下常聽眞經寳月池邊遥聞稚梵生前萬罪自此消除殁後三塗因今解釋乗龍駕鶴逍遥十極之天悟道登眞自在三淸之上福流見生再果當來莫似今在早相離别洪惟列聖允鑒精誠有識含生俱登正道次與亡靈回向念善退次靜夜於玄師前唱讃行道法事引下堦於九幽燈前立次關九幽地獄燈次勑水次昇壇次面西請三師次宣建壇說戒儀第二日清旦唱讃行道宣科出官一依常儀臨午如故靜夜行道宣科至三啓三禮畢今道流一人就請三十六位上章靈官上香茶酒果供養次法師就位出官拜酆都拔亡章次讀章次遣官操伏次依儀大謝次迎章於堦下焚之次焚章頌迴向念善退罷散日初更散壇一依常儀次送三師次詣玄師前請白如故二更初詣亡靈前請浴次法師啓白請亡靈赴浴堂伏以黄泉冥漠凝濁而滯染魂神黑壤幽隂積穢而沉埋靈爽昏昏長夜難遂超昇是以太上慈憐元皇悲愍垂洗滌塵勞之法宣沐浴錬度之科即使業網斷除罪源蠲釋今則嚴陳寳室潔備蘭湯設五香澡盥之儀按三籙拯拔之格奉請亡過某人赴浴室洗浣蕩濁流淸事畢嚴裝歸位聽法次法事引亡靈往浴室沿路今道流一人洒淨念諸天内音大梵隱語前行淨路至浴次法事止次今道流一人就浴盆以木杓從西南起左攪三十二轉念沐浴蕩穢呪天澄炁清五色髙明日月吐暉濯錬身形神津内盥香湯錬精光景洞耀煥暎上清炁不受塵五府納靈罪滅三塗禍消九冥惡根斷絶福慶自生今日大願一切告明身受開度昇入帝庭次又念沐浴錬眞呪太上髙眞九靈之精使魂飛仙上登紫庭沐浴華池身神澄清精通太虚萬炁自生次法師念沐浴丹陽錬度亡魂大呪龍漢蕩蕩无形无名眇眇億劫皇道開清神燈明耀九魂吐精王虛澄暉太霞髙明元始開化諸天齊靈三元導養二象攝生巳度者度未成者成巳死即化巳枯即榮蠢飛蜎息一切靈冥懷胎含孕咸得受生亡者命過魂歸三清魄受錬度南宫變形今日大吉皆得光明五帝鑒暎普告萬靈天地神祇及諸河源五嶽四瀆及諸名山洞玄洞虚洞空洞仙无極大聖至眞尊神元窮无極普監度生地根斷絶玄都記名衆神並暎一切咸聽次道衆吟沐浴東井頌如三啓吟出二十四圖經天河灌東井石景水毋精圎光拂靈曜玄暉瑩髙明元始披重夜天人逐月生沐浴蘭池上龍負長綆缾金童灑香花玊女流五星冠帶濯玉津錬度五仙形體香萬神降乗景登髙清次道衆吟散法事畢次捲起裏面簾幕次俟浴畢法師念冠帶呪五濁巳清八景巳明今日受錬罪滅福生長與五帝齊景上靈次捲起外面簾次道衆吟法水度魂頌今者澡蠲旣畢嚴潔巳成霓衣楚楚以飄香雲趾徐徐而離室請對三尊之御宣盟九籥之科傳戒受符超凡入聖庶克成於妙果期速證於殊縁靈魄如存俯從迎導次法事迎引亡靈沿路令道士一名洒淨水念諸天梵言隱語至三清側面向東北角設香花卓子拜褥以手爐小案子一面於香花卓子前令亡靈於褥位立聽法次法師啓白仰啓三清上聖十極靈仙俯垂鑒佑之私深諒精䖍之懇今者以亡過某人已周香沐載整靈儀旣當太上御前祇受皈依眞戒所宜肅端躬已欽奉教科勿形墮慢之容恐墜資薦之果爾時元始天尊昔在香林園内大福堂中爲諸天仙衆三界主宰一切靈祇說生死因縁功過宿命是時即有救苦眞人上白天尊言臣覩幽隂地獄之内羅酆北府之中一切亡魂沉淪受苦或攀劒樹或踐刀山碓搗磑磨鑊湯爐炭肢體零壞膏血交流萬死千生不捨晝夜其間獨有一人形容無畏廵履無傷往來獄中苦不能害祥光瑞炁覆護其身不審此人有何善果天尊言善哉善哉縁此人在生之日心奉大道志慕善縁曽受九眞妙戒救苦眞符佩負靈文持心弗怠所以死魂快樂自在逍遥雖經地獄之中不受輪迴之苦削名黒簿長覩光明即得昇上南宫克證仙果今則三清御座衆聖臨軒奉爲亡靈依科傳戒伏冀受持之後崇奉修行當得永離隂冥便昇快樂罷幽牢之罪對證清淨之福縁更冀垂休潜扶宗族謹依科法備列威儀奉爲亡靈傳授經戒恭惟淨魄諦受聖言次知磬唱人各恭信次皈依三寳宣告亡靈第一皈依得拔罪濟苦功德不可思議今依天尊威儀次第傳授伏冀神魂儼若諦受諦聽次與亡靈說九眞戒第一受初眞戒者不殺不盜行平等心當來託生獲端正長壽持心勿犯第二受念眞戒者不淫不慾無著邪見當來託生獲聰明智惠持心勿犯第三受持眞戒者不嫉不妬不取非横財物當來託生獲富貴豪盛持心勿犯第四受守眞戒者常行善念無有欺誑當來託生獲吉慶安樂持心勿犯第五受保眞戒者不飲酒食肉殺害衆生當來託生獲清淨安閑持心勿犯第六受修眞戒者願念衆生解悟大道當來託生獲法身善性持心勿犯第七受成眞戒者崇奉道法修福持齋當來託生獲具足十相持心勿犯第八受得眞戒者退身度人不犯衆惡當來託生獲遇大道教法持心勿犯第九受登眞戒者尊奉師訓無有懈倦當來託生獲大法王持心勿犯向來所宣九眞妙戒並是太上金口演說受持旣畢檢束神魂蓋以戒法精嚴威禁至重仗此九眞之力永辭五苦之殃徑上南宫登超紫府當得金童接引玉女奉迎快樂逍遥无上道寳十方上聖太上三尊億劫度人先天立教慈悲廣救普及羣生玉相金容常當信禮志心皈依十方道寳當願亡靈起心迴向一切信禮宣告亡靈第二皈依无上經寳十方世界寳藏靈文玊字金書龍章鳯篆三十六部萬八千篇指引凡迷超昇道岸行行滅罪句句消災此世他生常當信禮志心皈依十方經寳當願亡靈心開悟解受持轉誦宣告亡靈第三皈依无上師寳玄中大聖靈寳三師正一眞人三天教主十方世界得道神仙傅法授經開度羣品是眞父母是大醫王此世他生常當信禮志心皈依十方師寳當願亡靈普上法橋无有障礙次法師再啓白向來所宣三皈依者是上皇元年天尊現九色光相遍照諸天諸地大㑹中並見罪福種種不同乃知道用人宣人從道立汝等便可修行持心在念吾當爲汝說九眞妙戒金籙白簡救苦眞符汝等欽奉受持勿生懈慢即無爲自在況乃天尊設教拯濟沉淪觀羅酆隂暗之中徧九地幽牢之内見諸罪苦報對輪迥萬死千生無有休息是故天尊慈惠哀愍衆生乃召九光童子救苦眞人給付九眞妙戒金籙靈符拔度罪魂離苦解脱各遂超生道岸身入光明今則依按瓊科傳符授戒亡靈旣已叅受神識便遂往生消殁後之怨憎解生前之𡨚結伏願侍經玊女護戒靈童飛天神王巨天力士遍下无極世界九幽地獄之中二十四曹三十六府當與亡靈削名黒簿滅罪隂關開長夜之幽扄指無爲之道路九霄宫内常爲遊宴之方八極天中永作逍遥之界尚慮功德未備法制有虧更爲亡靈告盟衆聖出九幽壇牒證此齋功金籙眞符庶明劵驗冀靈儀而保執爲身據以生方地司無留滯之尤天界有優遊之趣分明領受咸使聞知次法師捧眞符白簡祝曰簡㪚壇時巳對三寳讀了更不宣當願亡靈受持金籙白簡永辭幽夜徑上南宫無縈迷執之尤克證逍遥之果祝畢給付與亡靈案子上次令道流一人讀九幽壇牒宣讀次法師祝牒當願亡靈受持黃籙齋法九幽壇牒周圎齋事執牒爲慿隂司更不拘留地府永消罪録魂神超度靈識分明今對道前一如宣示祝畢給付與亡靈案子上次啓白入十眞禮伏以髙晨元聖旣彰度品之慈大暮沉靈寔假崇因之力顧明科而式奉仰幽魄以是資已陳大洞之儀荐格重霄之睠南宫受度將遂於嬉神北府校諐即期於削籍殊喜昭集妙䕃溥臨巳聞三寳之名載舉十眞之號次舉十眞禮志心皈命禮東方華林境界惠靜裝嚴无極之國靜境眞人願普救亡魂衆和永出三塗苦巳下並齊和永出三塗苦志心皈命禮南方梵天境界端化裝嚴无極之國眞老眞人願普救亡魂永出三塗苦志心皈命禮西方金光境界利益裝嚴无極之國法寳眞人願普救亡魂永出三塗苦志心皈命禮北方眞定境界救度裝嚴无極之國救苦眞人願普救亡魂永出三塗苦志心皈命禮東北方長樂境界周帀裝嚴无極之國妙音眞人願普救亡魂永出三塗苦志心皈命禮東南方碧霞境界妙寂裝嚴无極之國眞定眞人願普救亡魂永出三塗苦志心皈命禮西南方耀眞境界善救裝嚴无極之國瓊光眞人願普救亡魂永出三塗苦志心皈命禮西北方妙道境界眞仙裝嚴无極之國濟苦眞人願普救亡魂永出三塗苦志心皈命禮上方元都境界紫霄裝嚴无極之國妙行眞人願普救亡魂永出三塗苦志心皈命禮下方水運丹界淨土裝嚴无極之國太極眞人願普救亡魂永出三塗苦次唱禮盡十方空界一切眞人奉爲亡靈䖍心懴悔次長跪懴悔志心懴悔奉爲亡靈懴悔慳貪嗔怒愚癡罪邪淫偷盜殺生愆謗經毀教不皈依慢道背眞違誓約身心妄想無休日耳眼生貪不住時未來過去及今生三世罪根難可測此日發心稱懴悔從前障惱願消除言詞旣向道前陳衆聖定應空裏鑒志心重懴耳眼鼻舌身心罪六根六慾六情愆管絃嘹喨少眞音紫緑暉華非正色蘭麝競裝馨香處車馬爭矜馳騁時甘辛不節自傷生喜怒無常惟奪筭六根毎引沉淪路三寶常開拯拔門衆今發露首前愆總願罪根盡消滅志心稽首禮謝无上正眞三寳次吟三塗五苦頌次舉三啓頌向來功德並已周圎伏冀亡靈俯迴昭鑒然願躋神紫府載魄朱陵逍遥十極之方自在三清之境福流見在慶及宗親一切舎生俱登道岸次法事引亡靈却歸靈座奉安次法師啓白今者巳對三寳周圎勝利即肅恭而諦受宜寅畏以欽承仍備肆筵即期就序享芬芳之佳薦俟周滿之洪因今奉爲亡靈念玊清聖境寳光流精法食呪曰回首仰圎羅含光挹靈芳拘魂制七魄思齊定中方行住理虛无寢息宴瓊房飢飡黃壁花渴飲瓊根漿神精命大魔合體錬眞光復照觀太无長在空中遊圓同泯波際眞化靡終期杳妙无終始行者當自知寂寥忘理教應運闡宏規降道不自照要當先所施會歸无二處隨心自合離次重啓白今則眞儀備舉妙唱悉周總集殊因並資逝魄伏冀靈魂不昧幽趣無方離五苦之寒庭永辭長夜聞三清之妙道盡契无爲福祐門庭慶流眷愛一切含生之類俱登仁夀之郷稽首皈依无極大道次法事引下堦焚亡靈符簡次吟焚符簡頌太上法微妙簡籙度人天元始吿符命時克獲昇遷傳授救沉溺皆得自翛然書名金簡籙逍遥玊帝前次回向與亡靈念善退次往大門外設香卓子上香召无主孤魂滯魄伏以妙道先天勛覃穹厚聖君御宇德被幽明綿區推及物之恩長夜降漏泉之澤凡處沉冥之仵悉頒濟度之私崇道薦亡救及一切其或英雄佐國忠赤事君逢危不顧於一身致命乃酬於萬乗殁於沙磧死在戰場骨未瘗藏魂方沉滯或即効官萬里馳命四方染疫癘以卒終遇傷害而横夭關源爲阻閭里攸賖春夏秋冬絶於祭祀或投名上國商賈東西跋履山川泛渉江海遇毒蟲而害命遭狂浪以摧舟或㓜入空門長依釋教孤隱於林泉之裏栖遲於巖谷之中志慕修行自甘寂寞或爲遊客或掌化縁荏苒傾亡因循遷化或情嫌凡俗心樂仙郷全清閑養素之名居碧嶂出塵之界未遂長生之理難逃短景之期或有工妙丹靑藝髙藥術因兹遊歷客死他郷或効力往還傭身驅役或有𡨚而暗害或無吿以自殘魂魄飛揚無依無倚或作狂徒劫盜逆黨叛臣負國難以自甘墮陰冥而敢恨或有欺慢神理或不孝父孃受天譴以滅殂犯罰責而致殞或困貧而寒餓或避法以逃藏計窮而自盡山林事急而身投河井或被虎狼啗食或以水火漂焚是女是男或少或老雖莫知於名姓冀相率以俱來先沐浴以清神受法筵之饗祭今者謹有齋主某人奉爲亡過某人或遇七七周年百日三年遠忌資薦往生命道士若干就奉靈位或云住宅開啓无上黄籙大齋若干晝夜設九幽清醮一座拜金籙符簡供養夜宴冥齋救度一切亡靈咸登道果伏望冥塗滯魄逺路孤魂應請而來齊赴蘭湯之浴入筵無碍聽宣教戒之文魂而有靈伏惟尚饗次法事引孤魂往浴室沿路令道士一人以淨水洒穢念諸天内音大梵隱語至浴室次令道流一名先於浴室盆内以杓自西南起左攪水三十二轉念法水呪太上神水五行之數生能育物洗新除故渇飲養命死苦難遇若非大慈何爲救度太上无上尊吟此一句次往女浴室攪水念呪同上次下浴室簾道衆吟散花法事俟浴畢法師啓白再啓黃壤沉靈冥臺逝衆今者巳周蘭浴咸遂清虚各捨惡心共相和睦宜序分而就列俾躬肅以登筵歆饗芳餚無執迷見悉期超度盡出幽牢世世生生永同樂土次法事引孤魂於無碍筵座次法師與道衆廵遶茭郭吟光明頌太上大道君位處無爲郷寳光眞童子下理九幽房悲嗟苦魂役拔度痛哀傷二十四門戸咸令聞寳香燈明照長夜願消累劫殃次往地獄官位破二十四地獄文在别卷逐位破了旋除旛子掲位牌次入茭郭南門穿入起㝷聲救苦天尊四聲衆和次吟未央偈三首逐首先和四聲功德尾和无上尊九幽黒闇那堪往到者雷同是罪人冥冥難得見光明太上慈尊來救度大慈大悲㝷聲救苦來衆和无上尊餓鬼窮魂皆解脱𡨚家債主總懽心刀山劒樹悉摧鋒爐炭鑊湯俱滅燄大慈大悲㝷聲救苦來衆和无上尊構置𡨚憎生地獄迴心懽喜是天堂至尊威力不思議願假慈光宣教戒大慈大悲㝷聲救苦來衆和无上尊次法師出茭郭北門行載舉四聲功德獨吟九幽苦神頌行往教戒處生落苦神界轉輪五道停九幽長夜閉累劫無光明刀山多劒樹毐刃互崢嶸不見羣鳥集但聞苦魂聲迴風揺長夜哀響流寒庭上有履山魂時刻無停寧飢食曲泉炭渇飲冶火精流曵三塗中豈識形與名念汝不知命苦哉傷人情大慈大悲㝷聲救苦來衆和无上尊次法師向鬼門褥次就座次起啓堂頌次宣教戒儀開經收經説業報因縁並在儀内宣儀場四二十畢次吟天尊往生頌三首頌在教戒儀末次法事引往大門外先燒亡靈及孤魂錢綵等次吟焚詞頌次回向念善退次重上香火設九幽醮先詣玄師前唱讃行道次啓堂頌次宣設醮儀如故次吟送眞靈頌次焚表頌次回向念善退九幽醮圖牒式國家牒用四道單狀錢馬四分士庶牒用一道單狀九分每分錢二貼天師門下牒上城隍土地諸神祇今謹有崑崙東南宛利天境弃賢世界赤縣中央某府某縣某郷里居住大道弟子具衘某伏爲亡靈某邊忌或終七百日周渾大祥預於某處請道士若干人開啓无上黃籙大齋某晝夜罷散日拜草龍白簡先設幽塗滯爽無主孤魂冥陽無碍夜筵一中及設九幽醮一座某分位所伸意者總用資薦亡殁某人超生淨域取今月某日亥時施排質信燈燭香花開啓道場宣揚法事莫不事因發迹委任靈祇輙具懇誠故行關牒者牒具如前事須牒上城隍土地社令神祇五道大將軍河侯河伯蒿里丈人土下二千石官丘丞墓伯十二塜侯冥關幽路一切主者伏請同遵大教共證齋功使亡靈承開度之恩見在獲遐長之福齋功成就期進眞階科法昭明豈虛効信謹牒年月日牒具法位姓某押牒城隍當境社令五道大將軍黃籙九幽醮無礙夜齋次第儀
